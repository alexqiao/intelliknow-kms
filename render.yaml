services:
  - type: web
    name: intelliknow-kms-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    runtimeVersion: "3.11"
    envVars:
      - key: QWEN_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./data/intelliknow.db
